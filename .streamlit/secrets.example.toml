# ─────────────────────────────────────────────────────────────────────────────
# DealScreen AI — Streamlit Secrets Template
# Copy relevant sections into the Streamlit Cloud "Secrets" panel,
# or rename this file to secrets.toml for local development.
# DO NOT commit a real secrets.toml to git (it is already in .gitignore).
# ─────────────────────────────────────────────────────────────────────────────

# ── Anthropic API key (required) ─────────────────────────────────────────────
ANTHROPIC_API_KEY = "sk-ant-..."

# ── Google Sheets — Deal History (optional) ──────────────────────────────────
# When configured, DealScreen AI writes deal history to the specified sheet
# AND keeps a local JSONL backup.  If omitted, only the local file is used.
#
# Steps to enable:
#   1. Create a Google Sheet (any name). Note its full URL.
#   2. In the sheet, add a tab named "Sheet1" (the default).
#   3. Create a Google Cloud service account with "Sheets API" enabled.
#   4. Share the sheet with the service account email (Editor role).
#   5. Download the service account JSON key and paste the fields below.
#
[connections.deals_sheet]
spreadsheet   = "https://docs.google.com/spreadsheets/d/YOUR_SHEET_ID/edit#gid=0"
type          = "gsheets"

# Service-account credentials (from the downloaded JSON key file):
type_sa           = "service_account"
project_id        = "your-gcp-project-id"
private_key_id    = "key-id-here"
private_key       = "-----BEGIN RSA PRIVATE KEY-----\n...\n-----END RSA PRIVATE KEY-----\n"
client_email      = "dealscreen@your-project.iam.gserviceaccount.com"
client_id         = "123456789"
auth_uri          = "https://accounts.google.com/o/oauth2/auth"
token_uri         = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url        = "https://www.googleapis.com/robot/v1/metadata/x509/dealscreen%40your-project.iam.gserviceaccount.com"
